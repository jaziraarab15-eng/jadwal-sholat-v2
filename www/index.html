<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Sholat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🕌 Jadwal Sholat</h1>

  <h2 id="kota">Memuat lokasi...</h2>
  <p id="tanggal">Memuat tanggal...</p>
<p id="hijri">🌙 Memuat tanggal Hijriah...</p>

<div class="card">
  <h3>🧭 Arah Kiblat</h3>

<div id="compass" style="font-size:80px;text-align:center;transition:transform .2s;">
🧭
</div>

  <p id="qibla">Menghitung...</p>
</div>

  <div class="next-card">
    <h3 id="nextPrayer">Salat Berikutnya</h3>
    <h1 id="countdown">00:00:00</h1>

    <label>
      <input type="checkbox" id="notifToggle" checked>
      🔔 Aktifkan Notifikasi
    </label>
  </div>

  <div class="card">
    <p>🌅 Subuh <span id="fajr">--:--</span></p>
    <p>🌄 Syuruq <span id="sunrise">--:--</span></p>
    <p>☀️ Zuhur <span id="dhuhr">--:--</span></p>
    <p>🌇 Asar <span id="asr">--:--</span></p>
    <p>🌆 Magrib <span id="maghrib">--:--</span></p>
    <p>🌙 Isya <span id="isha">--:--</span></p>
  </div>
</div>

<script src="notifications.js"></script>
<script src="visual-background.js"></script>
<script src="app.js"></script>

</body>
</html>
